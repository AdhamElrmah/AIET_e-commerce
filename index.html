<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NovaMart — Premium e-commerce store built with MVC architecture and OOP principles." />
  <title>NovaMart — Premium Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ========== NAVBAR ========== -->
  <nav class="navbar" id="navbar">
    <div class="navbar__inner">
      <a href="#" class="navbar__logo" id="logo-link">
        <span class="navbar__logo-icon">◆</span>
        <span class="navbar__logo-text">NovaMart</span>
      </a>

      <div class="navbar__search" id="search-container">
        <input type="text" class="navbar__search-input" id="search-input" placeholder="Search products…" autocomplete="off" />
        <button class="navbar__search-btn" id="search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>

      <div class="navbar__actions">
        <button class="navbar__action-btn" id="auth-btn" aria-label="Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="navbar__action-label" id="auth-label">Sign In</span>
        </button>
        <button class="navbar__action-btn" id="cart-btn" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="navbar__badge" id="cart-badge">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main" id="main-content">
    <!-- Dynamic content rendered by Views -->
  </main>

  <!-- ========== CART SIDEBAR ========== -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-sidebar__header">
      <h2 class="cart-sidebar__title">Your Cart</h2>
      <button class="cart-sidebar__close" id="cart-close" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-sidebar__body" id="cart-sidebar-body">
      <!-- Cart items rendered here -->
    </div>
    <div class="cart-sidebar__footer" id="cart-sidebar-footer">
      <!-- Cart totals rendered here -->
    </div>
  </aside>

  <!-- ========== TOAST CONTAINER ========== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ========== JS MODULES ========== -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
